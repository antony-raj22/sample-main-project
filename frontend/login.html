<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <!-- Noise overlay -->
  <div class="noise"></div>

  <main class="page">

    <!-- Left panel — branding -->
    <aside class="panel-left">
      <div class="brand">
        <div class="brand-mark">TF</div>
        <span class="brand-name">TaskFlow</span>
      </div>
      <div class="tagline">
        <h1>Every great<br/><em>task starts</em><br/>with a login.</h1>
        <p>Manage your work beautifully.<br/>Backed by Django REST Framework.</p>
      </div>
      <div class="left-footer">
        <span class="pill">🔒 Secure</span>
        <span class="pill">⚡ Fast</span>
        <span class="pill">✦ Simple</span>
      </div>
    </aside>

    <!-- Right panel — form -->
    <section class="panel-right">
      <div class="form-card">

        <div class="form-header">
          <h2>Welcome back</h2>
          <p>Sign in to your account</p>
        </div>

        <!-- Error / Success alert -->
        <div class="alert" id="alert" role="alert" aria-live="polite"></div>

        <form id="loginForm" novalidate>

          <div class="field-group" id="group-username">
            <label for="username">Username</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <circle cx="10" cy="7" r="3.5"/>
                  <path d="M3 17c0-3.866 3.134-7 7-7s7 3.134 7 7"/>
                </svg>
              </span>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="your_username"
                autocomplete="username"
                required
              />
            </div>
            <span class="field-error" id="err-username"></span>
          </div>

          <div class="field-group" id="group-password">
            <label for="password">Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <rect x="4" y="9" width="12" height="9" rx="2"/>
                  <path d="M7 9V6a3 3 0 116 0v3"/>
                </svg>
              </span>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <button type="button" class="toggle-pass" id="togglePass" aria-label="Toggle password visibility">
                <svg class="eye-open" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M1 10s3.5-7 9-7 9 7 9 7-3.5 7-9 7-9-7-9-7z"/>
                  <circle cx="10" cy="10" r="2.5"/>
                </svg>
                <svg class="eye-closed hidden" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6">
                  <path d="M3 3l14 14M6.5 6.6A7 7 0 003 10s3.5 7 9 7a7 7 0 003.5-.9M10 4c4.5 0 7 6 7 6a13 13 0 01-1.7 2.3"/>
                </svg>
              </button>
            </div>
            <span class="field-error" id="err-password"></span>
          </div>

          <div class="form-options">
            <label class="remember">
              <input type="checkbox" id="remember"/>
              <span class="checkmark"></span>
              Remember me
            </label>
            <a href="#" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader" aria-hidden="true"></span>
          </button>

        </form>

        <div class="form-divider"><span>or</span></div>

        <div class="register-link">
          Don't have an account? <a href="#">Create one</a>
        </div>

        <!-- API base config -->
        <div class="api-config">
          <label for="apiBase">API</label>
          <input type="text" id="apiBase" value="http://127.0.0.1:8000" placeholder="http://127.0.0.1:8000"/>
          <span class="conn-dot" id="connDot" title="Connection status"></span>
        </div>

      </div>
    </section>

  </main>

  <script src="login.js"></script>
</body>
</html>
